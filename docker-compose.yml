name: nileshop

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nileshop-nginx
    ports:
      - "${NGINX_PORT:-8888}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/backend/public:ro
      - ./apps/web/dist:/var/www/frontend:ro
    depends_on:
      - laravel
      - react
    networks:
      - nileshop

  laravel:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    container_name: nileshop-laravel
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - ./docker/laravel/php.ini:/usr/local/etc/php/conf.d/99-nileshop.ini:ro
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-nileshop}
      DB_USERNAME: ${DB_USERNAME:-nileshop}
      DB_PASSWORD: ${DB_PASSWORD:-nileshop_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MEILISEARCH_HOST: http://meilisearch:7700
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-nileshop}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-nileshop_secret}
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: ${AWS_BUCKET:-nileshop}
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      AWS_URL: ${AWS_URL:-http://localhost:8888/media}
      FILESYSTEM_DISK: s3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - nileshop

  horizon:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    container_name: nileshop-horizon
    working_dir: /var/www/backend
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/backend
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-nileshop}
      DB_USERNAME: ${DB_USERNAME:-nileshop}
      DB_PASSWORD: ${DB_PASSWORD:-nileshop_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
    depends_on:
      - laravel
      - redis
    networks:
      - nileshop

  scheduler:
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    container_name: nileshop-scheduler
    working_dir: /var/www/backend
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/backend
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-nileshop}
      DB_USERNAME: ${DB_USERNAME:-nileshop}
      DB_PASSWORD: ${DB_PASSWORD:-nileshop_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - laravel
    networks:
      - nileshop

  react:
    build:
      context: .
      dockerfile: docker/react/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8888/api/v1}
    container_name: nileshop-react
    expose:
      - "5173"
    networks:
      - nileshop

  postgres:
    image: postgres:16-alpine
    container_name: nileshop-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nileshop}
      POSTGRES_USER: ${DB_USERNAME:-nileshop}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nileshop_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-nileshop} -d ${DB_DATABASE:-nileshop}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nileshop

  redis:
    image: redis:7-alpine
    container_name: nileshop-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - nileshop

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: nileshop-meilisearch
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-nileshop_meili_master_key}
      MEILI_ENV: ${MEILI_ENV:-development}
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - nileshop

  minio:
    image: minio/minio:latest
    container_name: nileshop-minio
    ports:
      - "${MINIO_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nileshop}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nileshop_secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - nileshop

  minio-init:
    image: minio/mc:latest
    container_name: nileshop-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD 2>/dev/null; do sleep 1; done;
      mc mb local/nileshop --ignore-existing;
      mc anonymous set download local/nileshop;
      echo MinIO bucket ready;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nileshop}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nileshop_secret}
    networks:
      - nileshop

  mailpit:
    image: axllent/mailpit:latest
    container_name: nileshop-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1026}:1025"
      - "${MAILPIT_UI_PORT:-8026}:8025"
    networks:
      - nileshop

networks:
  nileshop:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
