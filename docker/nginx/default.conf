upstream laravel {
    server laravel:9000;
}

upstream react {
    server react:5173;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 100M;

    # API → Laravel (PHP-FPM)
    location /api {
        fastcgi_pass laravel;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        include fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_read_timeout 300;
    }

  location /up {
        fastcgi_pass laravel;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        include fastcgi_params;
    }

    location /docs {
        fastcgi_pass laravel;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        include fastcgi_params;
    }

    # MinIO object storage (product images, uploads)
    location /media/ {
        proxy_pass http://minio:9000/nileshop/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
    }

    # Laravel storage (public assets)
    location /storage {
        alias /var/www/backend/public/storage;
        try_files $uri $uri/ =404;
    }

    # Vite dev server (HMR)
    location /@vite {
        proxy_pass http://react;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /@fs {
        proxy_pass http://react;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /src {
        proxy_pass http://react;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /node_modules {
        proxy_pass http://react;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Frontend SPA (dev: Vite, prod: static dist)
    location / {
        proxy_pass http://react;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
